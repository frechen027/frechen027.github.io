theme:
    name: material #主题
    language: zh #语言

markdown_extensions:
    - admonition
    - pymdownx.highlight
    - pymdownx.superfences:
          custom_fences:
              - name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.arithmatex:
          generic: true

extra_javascript:
    - javascripts/config.js
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
    - mkdocs-jupyter
